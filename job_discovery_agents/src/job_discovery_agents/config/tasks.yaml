job_search_task:
  description: >
    Search the web for "Senior AI Engineer" jobs in {country}.
    Extract the Job Title, Company, and the URL for the posting.
  expected_output: >
    A list of 5 job postings with their titles, companies, and direct links.
    Using seach from tavily search tool and return clean and precise response
  agent: job_scraper

data_cleaning_task:
  description: >
    1. Search for 'Senior AI Engineer' jobs in {country}.
    2. Pick the top 3 direct job posting URLs.
    3. Use the website_scraper_tool to read the FULL content of each URL.
    4. Extract: Company Name, Salary (if any), and a list of 'Required Skills'.
  expected_output: >
    A detailed markdown report for 3 jobs, including deep-dive
    technical requirements extracted from the full page text.
  agent: job_scraper

